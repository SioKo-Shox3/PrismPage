name: ci

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  verify:
    name: Verify on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: node "$env:ProgramFiles\nodejs\node_modules\npm\bin\npm-cli.js" ci

      - name: Lint
        run: node "$env:ProgramFiles\nodejs\node_modules\npm\bin\npm-cli.js" run lint

      - name: Build frontend
        run: node "$env:ProgramFiles\nodejs\node_modules\npm\bin\npm-cli.js" run build

      - name: Check Rust
        run: cargo check --manifest-path src-tauri\Cargo.toml
